<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Usuários do Sistema - Portal RH</title>
    <link rel="stylesheet" href="/static/css/tabelas.css?v=10">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="card-tabela">
        <div class="card-header">
            <h2><i class="fa-solid fa-users-gear"></i> Usuários do Sistema</h2>
            <button class="btn-primary" onclick="window.location.href='/usuario/novo'" title="Cadastrar Usuário">
                <i class="fa-solid fa-user-plus"></i> Novo Usuário
            </button>
        </div>

        <div style="overflow-x: auto;">
            <table class="tabela-moderna">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome de Usuário</th>
                        <th>Perfil / Permissão</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr>
                        <td colspan="4" style="text-align:center; padding:20px; color: #6b7280;">Buscando usuários...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button onclick="window.location.href='/'" class="btn-voltar">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel
        </button>
    </div>

    <script src="/static/js/usuarios_lista.js?v=10"></script>
</body>

</html>

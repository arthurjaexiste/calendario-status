<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Usuários do Sistema</title>
    <link rel="stylesheet" href="/static/css/tabelas.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container-tabela">
        <div class="header-lista">
            <h2>Usuários do Sistema</h2>
            <button class="btn-add" onclick="window.location.href='/usuario/novo'" title="Cadastrar Usuário">
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </div>

        <table class="tabela-padrao">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome de Usuário</th>
                    <th>Perfil / Permissão</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr>
                    <td colspan="4" style="text-align:center; padding:20px;">Buscando usuários...</td>
                </tr>
            </tbody>
        </table>

        <button onclick="window.location.href='/'" class="btn-voltar">Voltar ao Menu</button>
    </div>

    <script src="/static/js/usuarios_lista.js?v=1"></script>
</body>

</html>

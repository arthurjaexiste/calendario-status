<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <title>Diário de Bordo - Portal RH</title>
    
    <link rel="stylesheet" href="/static/css/diario.css?v=13">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
</head>
<body>

    <div class="card-diario">
        <div class="diario-header">
            <div class="header-esquerda">
                <button class="btn-voltar" onclick="window.location.href='/'">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </button>
                <h2 id="tituloDiario">Diário de Bordo</h2>
            </div>
            
            <div class="header-direita">
                <label for="filtroStatus">Status:</label>
                <select id="filtroStatus" class="input-moderno">
                    <option value="Todos">Todos</option>
                    <option value="ROTA">Em Rota</option>
                    <option value="FOLGA">Folga</option>
                    <option value="FÉRIAS">Férias</option>
                    <option value="SUSPENSÃO">Suspensão</option>
                </select>
            </div>
        </div>

        <div class="diario-stats" id="diarioStats">
            <div class="stat-card rota">
                <span class="stat-label">Total Rota</span>
                <span class="stat-value" id="statRota">0h</span>
            </div>
            <div class="stat-card folga">
                <span class="stat-label">Total Folga</span>
                <span class="stat-value" id="statFolga">0h</span>
            </div>
            <div class="stat-card ferias">
                <span class="stat-label">Total Férias</span>
                <span class="stat-value" id="statFerias">0h</span>
            </div>
            <div class="stat-card suspensao">
                <span class="stat-label">Total Suspensão</span>
                <span class="stat-value" id="statSuspensao">0h</span>
            </div>
        </div>

        <div id="calendar"></div>
    </div>

    <div id="eventModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Detalhes do Evento</h3>
                <button class="modal-close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="detail-item">
                    <label><i class="fa-solid fa-user"></i> Funcionário</label>
                    <p id="modalFuncionario">-</p>
                </div>
                <div class="detail-item">
                    <label><i class="fa-solid fa-briefcase"></i> Cargo</label>
                    <p id="modalCargo">-</p>
                </div>
                <div class="detail-item">
                    <label><i class="fa-solid fa-calendar-day"></i> Data/Hora</label>
                    <p id="modalData">-</p>
                </div>
                <div class="detail-item">
                    <label><i class="fa-solid fa-comment-dots"></i> Observação</label>
                    <div class="obs-box" id="modalObservacao">-</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-close-modal" onclick="closeModal()">Fechar</button>
            </div>
        </div>
    </div>

    <script src="/static/js/diario.js?v=13"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Painel - Portal RH</title>
    <link rel="stylesheet" href="/static/css/menu.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header class="topbar">
        <div class="logo"><i class="fa-solid fa-layer-group"></i> Painel de Gestão</div>
        <div class="profile-icon" onclick="toggleSidebar()" title="Abrir Menu">AD</div>
    </header>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu Administrativo</h3>
            <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/"><i class="fa-solid fa-calendar-days"></i> Consultar Diário</a></li>
            <li><a href="/lancamento"><i class="fa-solid fa-pen-to-square"></i> Lançar Jornada</a></li>
            <li><a href="/usuarios"><i class="fa-solid fa-users-gear"></i> Usuários do Sistema</a></li>
            <li><a href="/funcionarios"><i class="fa-solid fa-id-card-clip"></i> Gestão de Funcionários</a></li>
            <li><a href="/logout" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Sair do
                    Sistema</a></li>
        </ul>
    </div>

    <main class="container-dash">
        <div class="card-menu">
            <h2>Consultar Diário de Bordo</h2>
            <p style="color: #6b7280; margin-bottom: 24px;">Selecione o colaborador que deseja auditar:</p>

            <div class="dropdown-container">
                <input type="text" id="inputBuscaFuncionario" class="input-busca"
                    placeholder="🔍 Clique ou digite o nome..." autocomplete="off">
                <div id="listaDropdownFunc" class="dropdown-lista"></div>
            </div>

            <button class="btn-acessar" onclick="acessarDiario()">Gerar Relatório</button>
        </div>
    </main>

    <script src="/static/js/menu.js"></script>
</body>

</html>

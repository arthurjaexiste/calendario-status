<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <title>Novo Usuário</title>
    <link rel="stylesheet" href="/static/css/lancamento.css">
</head>
<body>
    <div class="form-container">
        <h2>Cadastrar Novo Usuário</h2>
        <form id="formUsuario">
            <div class="form-group">
                <label>Login</label>
                <input type="text" id="new_usuario" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="new_senha" required style="width:100%; padding:10px; border-radius:4px; border:1px solid #ccc;">
            </div>
            <div class="form-group">
                <label>Perfil</label>
                <select id="new_perfil" required>
                    <option value="ADMIN">ADMIN</option>
                    <option value="RH">RH (Visualizador)</option>
                    <option value="LOGISTICA">LOGÍSTICA (Lançador)</option>
                </select>
            </div>
            <button type="submit">Salvar Usuário</button>
            <button type="button" onclick="window.location.href='/usuarios'" style="background:#5f6368; margin-top:10px;">Cancelar</button>
            <div id="msgStatus" class="mensagem"></div>
        </form>
    </div>
    <script src="/static/js/usuarios.js"></script>
</body>
</html>
